services:
  app:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - app_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/simple-gym.db
      # Match the host zone so date formatting (e.g. the CSV export) lines up
      # with what the app shows, not UTC.
      - TZ=Australia/Melbourne
      # Auth email flows (verification + password reset links). RESEND_API_KEY
      # and PROD_APP_URL come from the untracked .env at the repo root.
      - APP_URL=${PROD_APP_URL:-http://localhost:3001}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
    restart: unless-stopped

volumes:
  app_data:
