services:
  server:
    image: node:20-alpine
    command: sh -c "npm install --workspace=server && node --watch server/src/index.js"
    ports:
      - "3001:3001"
    volumes:
      - ./:/app
      - root_modules:/app/node_modules
      - server_modules:/app/server/node_modules
      - ./data:/app/data
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_PATH=/app/data/simple-gym.db
    working_dir: /app

  client:
    image: node:20-alpine
    command: sh -c "cd /app && npm install --workspace=client && cd /app/client && npx vite --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - root_modules:/app/node_modules
      - client_modules:/app/client/node_modules
    working_dir: /app/client
    environment:
      - NODE_ENV=development
      - VITE_API_TARGET=http://server:3001
    depends_on:
      - server

volumes:
  root_modules:
  server_modules:
  client_modules:
