<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>simple-gym</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#faf8f5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1612" media="(prefers-color-scheme: dark)" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="simple-gym" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Pacifico wordmark, matching the inventory app's branding -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />

    <script>
      // The blue homescreen icon (vs prod's orange) is the only staging/prod
      // differentiator — the in-app colour scheme stays the same in both.
      // Runs before iOS reads the apple-touch-icon for "Add to Home Screen".
      if (location.hostname.includes('staging')) {
        document.querySelector('link[rel="icon"]').href = '/favicon-staging.svg';
        document.querySelector('link[rel="apple-touch-icon"]').href = '/icons/icon-180-staging.png';
        document.querySelector('link[rel="manifest"]').href = '/manifest-staging.json';
        document.querySelector('meta[name="apple-mobile-web-app-title"]').content = 'gym-stg';
        document.title = 'simple-gym (staging)';
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
