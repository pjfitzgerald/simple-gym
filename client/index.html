<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>simple-gym</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#faf8f5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1612" media="(prefers-color-scheme: dark)" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="simple-gym" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png?v=2" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Pacifico wordmark, matching the inventory app's branding -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />

    <script>
      // Staging inverts the *branding* — homescreen icon/favicon are
      // brown-on-orange vs prod's orange-on-brown — while the in-app palette
      // stays the normal scheme, forced to light by default: the .staging
      // class on <html> opts out of index.css's auto-dark media query (an
      // explicit Dark in Settings still applies). Runs before first paint and
      // before iOS reads the apple-touch-icon for "Add to Home Screen".
      if (location.hostname.includes('staging')) {
        document.documentElement.classList.add('staging');
        document.querySelector('link[rel="icon"]').href = '/favicon-staging.svg';
        document.querySelector('link[rel="apple-touch-icon"]').href = '/icons/icon-180-staging.png?v=2';
        document.querySelector('link[rel="manifest"]').href = '/manifest-staging.json';
        document.querySelector('meta[name="apple-mobile-web-app-title"]').content = 'gym-stg';
        document.title = 'simple-gym (staging)';
        // The page renders light even on dark devices, so pin the dark-media
        // theme-color to the light background too.
        document.querySelector('meta[name="theme-color"][media*="dark"]').content = '#faf8f5';
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
