<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>simple-gym</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#faf9f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1917" media="(prefers-color-scheme: dark)" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="simple-gym" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <script>
      // Staging is themed blue (prod is orange) so the two are instantly
      // distinguishable — homescreen icon, status bar, and in-app accent.
      // Runs before iOS reads the apple-touch-icon for "Add to Home Screen".
      if (location.hostname.includes('staging')) {
        document.documentElement.classList.add('staging');
        document.querySelector('link[rel="icon"]').href = '/favicon-staging.svg';
        document.querySelector('link[rel="apple-touch-icon"]').href = '/icons/icon-180-staging.png';
        document.querySelector('link[rel="manifest"]').href = '/manifest-staging.json';
        document.querySelector('meta[name="apple-mobile-web-app-title"]').content = 'gym-stg';
        document.querySelectorAll('meta[name="theme-color"]').forEach((m) => m.remove());
        const tc = document.createElement('meta');
        tc.name = 'theme-color';
        tc.content = '#2563eb';
        document.head.appendChild(tc);
        document.title = 'simple-gym (staging)';
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
